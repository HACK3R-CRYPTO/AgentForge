<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    
    <!-- Shield/Forge Gradient -->
    <linearGradient id="forgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <!-- Flame Gradient -->
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="50%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="100" fill="url(#bgGradient)"/>

  <!-- Hexagon Outer Ring (AI/Tech) -->
  <polygon points="250,40 430,145 430,355 250,460 70,355 70,145" fill="none" stroke="url(#forgeGrad)" stroke-width="8" opacity="0.1"/>
  <polygon points="250,60 410,155 410,345 250,440 90,345 90,155" fill="none" stroke="url(#forgeGrad)" stroke-width="2" opacity="0.3"/>

  <!-- Anvil Structure -->
  <g transform="translate(100, 200)">
    <!-- Base -->
    <path d="M 60 160 L 240 160 L 220 120 L 80 120 Z" fill="#334155"/>
    <path d="M 120 120 L 180 120 L 180 80 L 120 80 Z" fill="#475569"/>
    <!-- Top (Face and Horn) -->
    <path d="M 20 80 
             C 40 80, 80 80, 100 50 
             L 260 50 
             L 260 80 Z" fill="#94A3B8"/>
    <!-- Highlight -->
    <polygon points="100,50 260,50 250,60 100,60" fill="#E2E8F0" opacity="0.5"/>
  </g>

  <!-- Digital Brain / Core floating above the Anvil -->
  <g transform="translate(250, 140)">
    <!-- Central Fire/Core -->
    <path d="M 0 60 C -30 30 -40 -10 0 -40 C 40 -10 30 30 0 60 Z" fill="url(#flameGrad)" filter="url(#glow)"/>
    
    <!-- Core Nodes (AI Element) -->
    <circle cx="0" cy="-10" r="12" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="0" cy="-10" r="6" fill="#3B82F6"/>
    
    <!-- Circuits -->
    <path d="M -12 -10 L -40 -10 L -40 20" fill="none" stroke="#60A5FA" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="-40" cy="20" r="4" fill="#60A5FA"/>

    <path d="M 12 -10 L 40 -10 L 40 20" fill="none" stroke="#60A5FA" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="40" cy="20" r="4" fill="#60A5FA"/>

    <path d="M 0 -22 L 0 -40 L -20 -60" fill="none" stroke="#60A5FA" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="-20" cy="-60" r="4" fill="#60A5FA"/>

    <path d="M 0 -22 L 0 -40 L 20 -60" fill="none" stroke="#60A5FA" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="20" cy="-60" r="4" fill="#60A5FA"/>
  </g>

  <!-- Spark particles -->
  <circle cx="170" cy="180" r="3" fill="#FCD34D" filter="url(#glow)"/>
  <circle cx="190" cy="120" r="2" fill="#FCD34D" filter="url(#glow)"/>
  <circle cx="330" cy="170" r="4" fill="#FCD34D" filter="url(#glow)"/>
  <circle cx="310" cy="100" r="2" fill="#F97316" filter="url(#glow)"/>
  
  <!-- Grounding reflection -->
  <ellipse cx="250" cy="380" rx="100" ry="10" fill="#000000" opacity="0.3"/>
</svg>
